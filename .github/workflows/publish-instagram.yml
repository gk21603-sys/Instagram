name: Publish scheduled Instagram posts

on:
  schedule:
    - cron: '0 10 * * *'   # 毎日 19:00 JST (UTC+9) に実行
  workflow_dispatch: {}     # 手動テスト実行用

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run publish script
        env:
          META_ACCESS_TOKEN: ${{ secrets.META_ACCESS_TOKEN }}
          IG_USER_ID_HIBANOMORI: ${{ secrets.IG_USER_ID_HIBANOMORI }}
          IG_USER_ID_HIBASOKEN: ${{ secrets.IG_USER_ID_HIBASOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_REF_NAME: ${{ github.ref_name }}
        run: node scripts/publish.mjs

      - name: Commit updated post status
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add posts-scheduled.json
          git diff --staged --quiet || git commit -m "chore: update post status [skip ci]"
          git push
